<!doctype html>
<html lang="gl">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="Práctica JavaScript - Accesible" />
    <meta name="keywords" content="JavaScript, HTML, CSS, Accesible" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="img/favicon.png" type="image/png" />
    <title>Práctica JavaScript - Accesible</title>
  </head>
  <body>
    <header>
      <h1>Práctica de JavaScript</h1>
    </header>

    <main class="container">
      <section aria-labelledby="form-title">
        <h2 id="form-title">Formulario de Contacto</h2>
        <form id="form" action="#" method="post" novalidate>
          <div class="form-group">
            <label for="nombre">
              Nome
              <span class="required" aria-hidden="true">*</span>
              <span class="sr-only">(obrigatorio)</span>
            </label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              required
              placeholder="Introduce o teu nome"
            />
            <div class="error" id="error-nombre" role="alert"></div>
          </div>

          <div class="form-group">
            <label for="email">
              Email
              <span class="required" aria-hidden="true">*</span>
              <span class="sr-only">(obrigatorio)</span>
            </label>
            <input
              type="email"
              id="email"
              name="email"
              required
              placeholder="Introduce o teu email"
            />
            <div class="error" id="error-email" role="alert"></div>
          </div>
          <div class="form-group">
            <label for="telefono">
              Teléfono
              <span class="required" aria-hidden="true">*</span>
              <span class="sr-only">(obrigatorio)</span>
            </label>
            <input
              type="tel"
              id="telefono"
              name="telefono"
              required
              placeholder="Introduce o teu teléfono"
            />
            <div class="error" id="error-telefono" role="alert"></div>
          </div>

          <div class="form-group">
            <label for="mensaje">
              Mensaxe
              <span class="required" aria-hidden="true">*</span>
              <span class="sr-only">(obrigatorio)</span>
            </label>
            <textarea
              id="mensaje"
              name="mensaje"
              maxlength="200"
              required
              aria-describedby="contador error-mensaje"
              placeholder="Introduce a túa mensaxe de máximo 200 caracteres"
            ></textarea>
            <div class="counter" aria-live="polite">
              <span id="contador">0</span>/200
            </div>
            <div class="error" id="error-mensaje" role="alert"></div>
          </div>

          <button type="submit">Enviar</button>
          <div
            class="status"
            id="status"
            role="status"
            aria-live="polite"
          ></div>
        </form>
      </section>

      <!-- Contador -->
      <section aria-labelledby="counter-title">
        <h2 id="counter-title">Contador de Clics</h2>
        <button id="btn-contar" type="button">Fai clic</button>
        <div class="click-box" aria-live="polite" aria-atomic="true">
          <span id="clics">0</span>
        </div>
      </section>

      <!-- Color -->
      <section aria-labelledby="color-title">
        <h2 id="color-title">Cor Aleatoria</h2>
        <button id="btn-color" type="button">Cambiar cor de fondo</button>
      </section>

      <!-- Pulsar tecla -->
      <section aria-labelledby="pulse-title">
        <h2 id="pulse-title">Pulsar unha tecla</h2>

        <label for="teclado" class="sr-only">Escribe ou pulsa unha tecla</label>
        <input id="teclado" type="text" placeholder="Pulsa unha tecla" />

        <div class="click-box" aria-live="polite" aria-atomic="true">
          <span id="tecla"></span>
        </div>

        <div class="counterTecla" aria-live="polite">
          <span id="contadorTecla"></span>
        </div>
      </section>

      <!-- Caixa -->
      <section aria-labelledby="box-title">
        <h2 id="box-title">Caixa interactiva</h2>
        <p class="box-title">Pasa por riba e a caixa cambiará de cor.</p>
        <div
          class="interactive"
          id="caixa"
          tabindex="0"
          role="button"
          aria-label="Caixa interactiva que cambia de cor ao pasar por riba"
          aria-pressed="false"
        >
          <p>Pasa por riba</p>
        </div>
      </section>
    </main>
    <footer>
      <div id="footer-interactivo"></div>
      <p class="footer">Práctica JavaScript - Accesible</p>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
